name: Build Windows Addon

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag for publishing this build"
        required: false
        type: string
      mpv_run_id:
        description: "mpv-winbuild-cmake run id to consume (optional)"
        required: false
        type: string
      mpv_workflow:
        description: "mpv workflow name"
        required: false
        default: "mpv clang"
        type: string

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag != '' && inputs.release_tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Stage libmpv package
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $args = @()
          if ("${{ inputs.mpv_run_id }}") {
            $args += "-RunId"
            $args += "${{ inputs.mpv_run_id }}"
          }
          if ("${{ inputs.mpv_workflow }}") {
            $args += "-WorkflowName"
            $args += "${{ inputs.mpv_workflow }}"
          }
          powershell -ExecutionPolicy Bypass -File .\tools\setup_windows_mpv_dev.ps1 @args

      - name: Configure Debug
        shell: pwsh
        run: |
          & "C:\Program Files\CMake\bin\cmake.exe" -S . -B build-ci-debug -DMPV_DIR="${{ github.workspace }}\dependencies\mpv-dev" -DGODOTCPP_TARGET=template_debug

      - name: Build Debug
        shell: pwsh
        run: |
          & "C:\Program Files\CMake\bin\cmake.exe" --build build-ci-debug --config Debug

      - name: Configure Release
        shell: pwsh
        run: |
          & "C:\Program Files\CMake\bin\cmake.exe" -S . -B build-ci-release -DMPV_DIR="${{ github.workspace }}\dependencies\mpv-dev" -DGODOTCPP_TARGET=template_release

      - name: Build Release
        shell: pwsh
        run: |
          & "C:\Program Files\CMake\bin\cmake.exe" --build build-ci-release --config Release

      - name: Assemble addon bundle
        shell: pwsh
        run: |
          $bundleRoot = Join-Path $PWD "release-bundle"
          $addonRoot = Join-Path $bundleRoot "addons\libmpv_zero\bin"
          $addonWindows = Join-Path $addonRoot "windows"
          New-Item -ItemType Directory -Force -Path $addonWindows | Out-Null
          Copy-Item -LiteralPath ".\project\bin\libmpv_zero.gdextension" -Destination (Join-Path $addonRoot "libmpv_zero.gdextension") -Force
          Get-ChildItem ".\project\bin\windows" -File | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination (Join-Path $addonWindows $_.Name) -Force
          }
          Copy-Item -LiteralPath ".\README.md" -Destination (Join-Path $bundleRoot "README.md") -Force
          Compress-Archive -Path (Join-Path $bundleRoot "*") -DestinationPath (Join-Path $PWD "libmpv-zero-windows-x86_64.zip") -Force

      - name: Upload addon artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-zero-windows-x86_64
          path: |
            libmpv-zero-windows-x86_64.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: ${{ env.RELEASE_TAG != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: true
          generate_release_notes: true
          files: |
            libmpv-zero-windows-x86_64.zip
